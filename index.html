<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMRC Tracker</title>
<meta name="theme-color" content="#ff6b00">
<meta name="apple-mobile-web-app-title" content="HMRC Tracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#1c1c1c;--border:#2a2a2a;--accent:#ff6b00;--green:#00c853;--red:#ff3d3d;--muted:#888;--text:#f0f0f0;--surface:#141414}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999}
#lock h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--accent);letter-spacing:4px}
#lock .box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:90%;max-width:340px;display:flex;flex-direction:column;gap:14px}
#lock input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1.1rem;padding:13px;text-align:center;letter-spacing:4px;outline:none;font-family:'DM Sans',sans-serif}
#lock input:focus{border-color:var(--accent)}
#lock button{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;padding:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
#lockErr{color:var(--red);font-size:0.85rem;text-align:center;display:none}
/* APP */
#app{display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--accent);letter-spacing:3px}
#badge{background:var(--accent);color:#fff;font-size:0.75rem;font-weight:600;padding:4px 12px;border-radius:20px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:13px 20px;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:18px;max-width:780px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
/* FORM */
.form-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.form-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#ffaa00;letter-spacing:2px;margin-bottom:14px}
.row{display:grid;gap:10px;margin-bottom:10px}
.r3{grid-template-columns:2fr 1fr 1fr}
.r3b{grid-template-columns:1fr 1fr 1fr}
.fg label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px}
.fg input,.fg select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:10px 12px;width:100%;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.profit-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:0.9rem;color:var(--green);font-weight:600}
.btn-add{background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;padding:12px;cursor:pointer;width:100%;margin-top:6px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat .lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.stat .val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem}
/* SIZE */
.sz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px}
.sz-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.sz-card .sz-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--accent);margin-bottom:4px}
.sz-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--muted);margin-top:2px}
.sz-row strong{color:var(--text)}
/* ENTRIES */
.ehdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ehdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px}
.ecnt{font-size:0.78rem;color:var(--muted);background:var(--card);padding:3px 10px;border-radius:20px;border:1px solid var(--border)}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;animation:si 0.25s ease}
@keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ebrand{font-weight:600;font-size:0.95rem;margin-bottom:3px}
.edate{font-size:0.7rem;color:var(--muted);margin-bottom:4px}
.emeta{display:flex;gap:14px;font-size:0.78rem;color:var(--muted);flex-wrap:wrap}
.emeta strong{color:var(--text)}
.ptag{display:inline-block;border-radius:6px;font-size:0.78rem;font-weight:600;padding:3px 10px;margin-top:5px;background:rgba(0,200,83,0.12);color:var(--green);border:1px solid rgba(0,200,83,0.25)}
.ptag.loss{background:rgba(255,61,61,0.12);color:var(--red);border-color:rgba(255,61,61,0.25)}
.ebtns{display:flex;gap:6px;flex-shrink:0}
.btn-e{background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.25);border-radius:6px;color:#ffaa00;font-size:0.8rem;padding:6px 10px;cursor:pointer}
.btn-d{background:rgba(255,61,61,0.1);border:1px solid rgba(255,61,61,0.2);border-radius:6px;color:var(--red);font-size:0.8rem;padding:6px 10px;cursor:pointer}
/* PDF BTN */
.btn-pdf{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:10px;cursor:pointer;width:100%;margin-bottom:16px}
.btn-pdf:hover{border-color:var(--accent);color:var(--accent)}
/* ARCHIVE */
.arc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.arc-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer}
.arc-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#ffaa00;letter-spacing:2px}
.arc-sub{font-size:0.78rem;color:var(--muted);margin-top:2px}
.arc-chev{color:var(--muted);transition:transform 0.2s}
.arc-card.open .arc-chev{transform:rotate(180deg)}
.arc-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.arc-card.open .arc-body{display:block}
.arc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.arc-stat{background:var(--surface);border-radius:8px;padding:10px;text-align:center}
.arc-stat .al{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.arc-stat .av{font-family:'Bebas Neue',sans-serif;font-size:1.1rem}
/* EDIT MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:600}
.modal.on{display:flex}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:92%;max-width:400px}
.mbox h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#ffaa00;letter-spacing:2px;margin-bottom:14px}
.mbtns{display:flex;gap:10px;margin-top:14px}
.mbtns button{flex:1;padding:11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;border:none}
.m-save{background:var(--accent);color:#fff}
.m-cancel{background:var(--surface);color:var(--text);border:1px solid var(--border)!important}
/* CONFIRM */
.conf{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:700}
.conf.on{display:flex}
.cbox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:320px;text-align:center}
.cbox h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent);margin-bottom:8px}
.cbox p{font-size:0.85rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.cbtns{display:flex;gap:10px}
.cbtns button{flex:1;padding:11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;border:none}
.c-ok{background:var(--accent);color:#fff}
.c-no{background:var(--surface);color:var(--text);border:1px solid var(--border)!important}
/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:0.85rem;font-weight:600;padding:10px 22px;border-radius:30px;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:800;white-space:nowrap}
#toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:2.5rem;margin-bottom:10px}
.loader{text-align:center;padding:30px;color:var(--muted);font-size:0.9rem}
@media(max-width:480px){.r3{grid-template-columns:1fr 1fr}.r3b{grid-template-columns:1fr 1fr}.stats .val{font-size:1.1rem}}
</style>
</head>
<body>

<div id="lock">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:4px">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="16" r="10" fill="#ff6b00"/>
      <ellipse cx="26" cy="38" rx="16" ry="11" fill="#ff6b00"/>
      <circle cx="26" cy="16" r="7" fill="#0a0a0a"/>
      <ellipse cx="26" cy="38" rx="13" ry="8" fill="#0a0a0a"/>
      <circle cx="26" cy="15" r="5.5" fill="#ffaa00"/>
      <ellipse cx="26" cy="37" rx="10" ry="7" fill="#ffaa00"/>
    </svg>
    <h1 style="font-family:Bebas Neue,sans-serif;font-size:2.5rem;color:var(--accent);letter-spacing:4px">HMRC</h1>
  </div>
  <p style="color:var(--muted);font-size:0.85rem;letter-spacing:1px">ENTER PASSWORD</p>
  <div class="box">
    <input type="password" id="pwIn" placeholder="••••••" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">UNLOCK</button>
    <div id="lockErr">Wrong password</div>
  </div>
</div>

<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="16" r="10" fill="#ff6b00"/>
        <ellipse cx="26" cy="38" rx="16" ry="11" fill="#ff6b00"/>
        <circle cx="26" cy="16" r="7" fill="#0a0a0a"/>
        <ellipse cx="26" cy="38" rx="13" ry="8" fill="#0a0a0a"/>
        <circle cx="26" cy="15" r="5.5" fill="#ffaa00"/>
        <ellipse cx="26" cy="37" rx="10" ry="7" fill="#ffaa00"/>
      </svg>
      <h1 style="font-family:Bebas Neue,sans-serif;font-size:1.7rem;color:var(--accent);letter-spacing:3px">HMRC</h1>
    </div>
    <span id="badge">...</span>
  </header>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('cur',this)">📦 This Month</button>
    <button class="tab" onclick="switchTab('arc',this)">🗂️ Archive</button>
  </div>
  <main>
    <div id="pg-cur" class="pg on">
      <div class="form-box">
        <h2>+ ADD COOKER</h2>
        <div class="row r3">
          <div class="fg"><label>Brand / Model</label><input type="text" id="fBrand" placeholder="e.g. Hotpoint"></div>
          <div class="fg"><label>Cost £</label><input type="number" id="fCost" placeholder="0.00" step="0.01" oninput="calcP()"></div>
          <div class="fg"><label>Sell £</label><input type="number" id="fSell" placeholder="0.00" step="0.01" oninput="calcP()"></div>
        </div>
        <div class="row r3b">
          <div class="fg"><label>Size</label>
            <select id="fSize">
              <option>50cm</option><option>55cm</option><option selected>60cm</option><option>90cm</option><option>100cm</option><option>Other</option>
            </select>
          </div>
          <div class="fg"><label>Condition</label>
            <select id="fCond">
              <option>Used</option><option>New</option><option>Refurbished</option>
            </select>
          </div>
          <div class="fg"><label>Profit (auto)</label><div class="profit-box" id="pPrev">£0.00</div></div>
        </div>
        <button class="btn-add" onclick="addEntry()">ADD ENTRY</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="lbl">Items</div><div class="val" id="sCount" style="color:var(--accent)">0</div></div>
        <div class="stat"><div class="lbl">Total Cost</div><div class="val" id="sCost" style="color:#ffaa00">£0</div></div>
        <div class="stat"><div class="lbl">Total Profit</div><div class="val" id="sProfit" style="color:var(--green)">£0</div></div>
      </div>
      <button class="btn-pdf" onclick="exportPDF()">📄 Export Monthly PDF</button>
      <div style="margin-bottom:8px"><strong style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:1rem">BY SIZE</strong></div>
      <div id="szGrid" class="sz-grid"></div>
      <div class="ehdr"><h2>ENTRIES</h2><span class="ecnt" id="eCnt">0 cookers</span></div>
      <div id="eList"><div class="loader">Connecting...</div></div>
    </div>
    <div id="pg-arc" class="pg">
      <div id="arcList"><div class="loader">Loading...</div></div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
  <div class="mbox">
    <h3>✏️ EDIT ENTRY</h3>
    <input type="hidden" id="eId">
    <div class="fg" style="margin-bottom:10px"><label>Brand</label><input type="text" id="eBrand"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="fg"><label>Cost £</label><input type="number" id="eCost" step="0.01" oninput="calcEP()"></div>
      <div class="fg"><label>Sell £</label><input type="number" id="eSell" step="0.01" oninput="calcEP()"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
      <div class="fg"><label>Size</label>
        <select id="eSize"><option>50cm</option><option>55cm</option><option>60cm</option><option>90cm</option><option>100cm</option><option>Other</option></select>
      </div>
      <div class="fg"><label>Condition</label>
        <select id="eCond"><option>Used</option><option>New</option><option>Refurbished</option></select>
      </div>
    </div>
    <div style="font-size:0.85rem;color:var(--muted)">Profit: <strong id="ePrev" style="color:var(--green)">£0</strong></div>
    <div class="mbtns">
      <button class="m-cancel" onclick="closeEdit()">Cancel</button>
      <button class="m-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="conf" id="conf">
  <div class="cbox">
    <h3 id="cTitle">CONFIRM</h3>
    <p id="cMsg"></p>
    <div class="cbtns">
      <button class="c-no" onclick="document.getElementById('conf').classList.remove('on')">Cancel</button>
      <button class="c-ok" id="cOk">OK</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, getDocs, writeBatch, serverTimestamp,
  getDoc, setDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey: "AIzaSyCUUEk0oEW_o_cRlKufON293gAg82TJAhs",
  authDomain: "mo-cooker-tracker.firebaseapp.com",
  projectId: "mo-cooker-tracker",
  storageBucket: "mo-cooker-tracker.firebasestorage.app",
  messagingSenderId: "1004687092025",
  appId: "1:1004687092025:web:3f992337234ef5563aa0e8"
};

const app = initializeApp(cfg);
const db = getFirestore(app);

// ── UTILS ──
const fmt = n => '£' + parseFloat(n||0).toFixed(2);
const fmts = n => { const v=parseFloat(n||0); return v>=1000?'£'+(v/1000).toFixed(1)+'k':'£'+v.toFixed(0); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const monthKey = d => { const x=d||new Date(); return x.toLocaleString('en-GB',{month:'long',timeZone:'Europe/London'})+'-'+x.toLocaleString('en-GB',{year:'numeric',timeZone:'Europe/London'}); };
const monthLabel = d => (d||new Date()).toLocaleString('en-GB',{month:'long',year:'numeric',timeZone:'Europe/London'});

function toast(msg, col) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = col||'var(--accent)';
  t.classList.add('on'); setTimeout(()=>t.classList.remove('on'), 2500);
}

function confirm(title, msg, cb) {
  document.getElementById('cTitle').textContent = title;
  document.getElementById('cMsg').textContent = msg;
  document.getElementById('conf').classList.add('on');
  document.getElementById('cOk').onclick = () => { document.getElementById('conf').classList.remove('on'); cb(); };
}

// ── PASSWORD ──
window.unlock = function() {
  const v = document.getElementById('pwIn').value;
  if (v === 'MO@MO') {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    startApp();
  } else {
    document.getElementById('lockErr').style.display = 'block';
    document.getElementById('pwIn').value = '';
  }
};

// ── TABS ──
window.switchTab = function(name, btn) {
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  btn.classList.add('on');
  if (name==='arc') loadArchive();
};

// ── PROFIT PREVIEW ──
window.calcP = function() {
  const p = (parseFloat(document.getElementById('fSell').value)||0) - (parseFloat(document.getElementById('fCost').value)||0);
  const el = document.getElementById('pPrev');
  el.textContent = fmt(p); el.style.color = p>=0?'var(--green)':'var(--red)';
};
window.calcEP = function() {
  const p = (parseFloat(document.getElementById('eSell').value)||0) - (parseFloat(document.getElementById('eCost').value)||0);
  const el = document.getElementById('ePrev');
  el.textContent = fmt(p); el.style.color = p>=0?'var(--green)':'var(--red)';
};

// ── START APP ──
let entries = [];
async function startApp() {
  document.getElementById('badge').textContent = monthLabel();
  await checkMonth();
  onSnapshot(collection(db,'hmrc-entries'), snap => {
    entries = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }, err => {
    console.error(err);
    document.getElementById('eList').innerHTML = '<div class="loader">Connection error. Check internet.</div>';
  });
  schedMidnight();
}

// ── MONTH CHECK ──
async function checkMonth() {
  const cur = monthKey();
  try {
    const snap = await getDoc(doc(db,'meta','hmrc-month'));
    const last = snap.exists() ? snap.data().cur : null;
    if (last && last !== cur) await archiveMonth(last);
    await setDoc(doc(db,'meta','hmrc-month'), {cur});
  } catch(e) { console.log('month check:', e.message); }
}

async function archiveMonth(mk) {
  try {
    const snap = await getDocs(collection(db,'hmrc-entries'));
    if (snap.empty) return;
    const batch = writeBatch(db);
    snap.docs.forEach(d => {
      batch.set(doc(collection(db,'hmrc-archive',mk,'entries')), d.data());
      batch.delete(d.ref);
    });
    await batch.commit();
    toast('📂 '+mk+' archived!', '#ffaa00');
  } catch(e) { console.log('archive err:', e.message); }
}

function schedMidnight() {
  const now = new Date();
  const uk = new Date(now.toLocaleString('en-US',{timeZone:'Europe/London'}));
  const next = new Date(uk); next.setDate(next.getDate()+1); next.setHours(0,1,0,0);
  setTimeout(async()=>{ await checkMonth(); document.getElementById('badge').textContent=monthLabel(); schedMidnight(); }, next-uk);
}

// ── RENDER ──
function render() {
  const list = document.getElementById('eList');
  document.getElementById('badge').textContent = monthLabel();

  const tot = entries.length;
  const tc = entries.reduce((s,e)=>s+(parseFloat(e.costPrice)||0),0);
  const ts = entries.reduce((s,e)=>s+(parseFloat(e.sellPrice)||0),0);
  const tp = ts - tc;
  document.getElementById('sCount').textContent = tot;
  document.getElementById('sCost').textContent = fmts(tc);
  document.getElementById('sProfit').textContent = fmts(tp);
  document.getElementById('sProfit').style.color = tp>=0?'var(--green)':'var(--red)';
  document.getElementById('eCnt').textContent = tot+' cooker'+(tot!==1?'s':'');

  // Size breakdown
  const sizes = {};
  entries.forEach(e=>{ const s=e.size||'Unknown'; if(!sizes[s])sizes[s]={n:0,c:0,sv:0}; sizes[s].n++; sizes[s].c+=parseFloat(e.costPrice)||0; sizes[s].sv+=parseFloat(e.sellPrice)||0; });
  const szEl = document.getElementById('szGrid');
  szEl.innerHTML = Object.keys(sizes).map(s=>{
    const d=sizes[s]; const p=d.sv-d.c;
    return `<div class="sz-card"><div class="sz-name">${esc(s)}</div>
      <div class="sz-row"><span>Items</span><strong>${d.n}</strong></div>
      <div class="sz-row"><span>Cost</span><strong>${fmt(d.c)}</strong></div>
      <div class="sz-row"><span>Sell</span><strong>${fmt(d.sv)}</strong></div>
      <div class="sz-row"><span>Profit</span><strong style="color:${p>=0?'var(--green)':'var(--red)'}">${fmt(p)}</strong></div>
    </div>`;
  }).join('');

  if (!tot) { list.innerHTML='<div class="empty"><div class="ei">📦</div><p>No entries yet. Add your first cooker above.</p></div>'; return; }

  // Sort newest first
  const sorted = [...entries].sort((a,b)=>{
    const at=a.createdAt?a.createdAt.seconds:0, bt=b.createdAt?b.createdAt.seconds:0;
    return bt-at;
  });

  list.innerHTML = sorted.map(e=>{
    const p=(parseFloat(e.sellPrice)||0)-(parseFloat(e.costPrice)||0);
    const loss=p<0;
    const dt=e.createdAt?new Date(e.createdAt.seconds*1000).toLocaleDateString('en-GB'):'Today';
    return `<div class="ecard">
      <div>
        <div class="ebrand">${esc(e.brand)}</div>
        <div class="edate">${dt} · ${esc(e.size||'')} · ${esc(e.condition||'')}</div>
        <div class="emeta"><span>Cost: <strong>${fmt(e.costPrice)}</strong></span><span>Sell: <strong>${fmt(e.sellPrice)}</strong></span></div>
        <span class="ptag${loss?' loss':''}">${loss?'▼ Loss':'▲ Profit'} ${fmt(p)}</span>
      </div>
      <div class="ebtns">
        <button class="btn-e" onclick="openEdit('${e.id}')">✏️</button>
        <button class="btn-d" onclick="delEntry('${e.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── ADD ──
window.addEntry = async function() {
  const brand=document.getElementById('fBrand').value.trim();
  const cost=parseFloat(document.getElementById('fCost').value);
  const sell=parseFloat(document.getElementById('fSell').value);
  const size=document.getElementById('fSize').value;
  const cond=document.getElementById('fCond').value;
  if(!brand){toast('Enter brand name','var(--red)');return;}
  if(isNaN(cost)||isNaN(sell)){toast('Enter valid prices','var(--red)');return;}
  try{
    await addDoc(collection(db,'hmrc-entries'),{brand,costPrice:cost,sellPrice:sell,size,condition:cond,profit:sell-cost,createdAt:serverTimestamp()});
    document.getElementById('fBrand').value='';
    document.getElementById('fCost').value='';
    document.getElementById('fSell').value='';
    document.getElementById('fSize').value='60cm';
    document.getElementById('fCond').value='Used';
    document.getElementById('pPrev').textContent='£0.00';
    toast('✅ Cooker added!');
  }catch(e){toast('Save failed','var(--red)');console.error(e);}
};

// ── DELETE ──
window.delEntry = function(id) {
  confirm('DELETE','Remove this cooker entry?', async()=>{
    try{ await deleteDoc(doc(db,'hmrc-entries',id)); toast('Deleted','var(--red)'); }
    catch(e){ toast('Error','var(--red)'); }
  });
};

// ── EDIT ──
window.openEdit = function(id) {
  const e = entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('eId').value=id;
  document.getElementById('eBrand').value=e.brand||'';
  document.getElementById('eCost').value=e.costPrice||'';
  document.getElementById('eSell').value=e.sellPrice||'';
  document.getElementById('eSize').value=e.size||'60cm';
  document.getElementById('eCond').value=e.condition||'Used';
  calcEP();
  document.getElementById('editModal').classList.add('on');
};
window.closeEdit = ()=>document.getElementById('editModal').classList.remove('on');
window.saveEdit = async function() {
  const id=document.getElementById('eId').value;
  const brand=document.getElementById('eBrand').value.trim();
  const cost=parseFloat(document.getElementById('eCost').value);
  const sell=parseFloat(document.getElementById('eSell').value);
  const size=document.getElementById('eSize').value;
  const cond=document.getElementById('eCond').value;
  if(!brand||isNaN(cost)||isNaN(sell)){toast('Fill all fields','var(--red)');return;}
  try{
    await updateDoc(doc(db,'hmrc-entries',id),{brand,costPrice:cost,sellPrice:sell,size,condition:cond,profit:sell-cost});
    closeEdit(); toast('✅ Updated!');
  }catch(e){toast('Error saving','var(--red)');}
};

  const eRows=entries.map((e,i)=>{const p=(parseFloat(e.sellPrice)||0)-(parseFloat(e.costPrice)||0);const dt=e.createdAt?new Date(e.createdAt.seconds*1000).toLocaleDateString('en-GB'):'-';return `<tr style="background:${i%2?'#fff':'#f9f9f9'}"><td>${dt}</td><td>${esc(e.brand)}</td><td>${e.size||'-'}</td><td>${e.condition||'-'}</td><td>${fmt(e.costPrice)}</td><td>${fmt(e.sellPrice)}</td><td style="color:${p>=0?'green':'red'};font-weight:600">${fmt(p)}</td></tr>`;}).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cooker Report - ${ml}</title>

  <body><div style="display:flex;align-items:center;gap:10px">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="16" r="10" fill="#ff6b00"/>
        <ellipse cx="26" cy="38" rx="16" ry="11" fill="#ff6b00"/>
        <circle cx="26" cy="16" r="7" fill="#0a0a0a"/>
        <ellipse cx="26" cy="38" rx="13" ry="8" fill="#0a0a0a"/>
        <circle cx="26" cy="15" r="5.5" fill="#ffaa00"/>
        <ellipse cx="26" cy="37" rx="10" ry="7" fill="#ffaa00"/>
      </svg>
      <h1 style="font-family:Bebas Neue,sans-serif;font-size:1.7rem;color:var(--accent);letter-spacing:3px">HMRC</h1>
    </div><h2>${ml} — Monthly Report</h2>
  <div class="sum"><div class="s"><div class="l">Items</div><div class="v" style="color:#ff6b00">${entries.length}</div></div><div class="s"><div class="l">Total Cost</div><div class="v" style="color:#e68a00">${fmt(tc)}</div></div><div class="s"><div class="l">Total Sell</div><div class="v">${fmt(ts)}</div></div><div class="s"><div class="l">Total Profit</div><div class="v" style="color:${tp>=0?'green':'red'}">${fmt(tp)}</div></div></div>
  <div class="t">By Size</div><table><thead><tr><th>Size</th><th>Items</th><th>Cost</th><th>Sell</th><th>Profit</th></tr></thead><tbody>${szRows}</tbody></table>
  <div class="t">All Entries</div><table><thead><tr><th>Date</th><th>Brand</th><th>Size</th><th>Condition</th><th>Cost</th><th>Sell</th><th>Profit</th></tr></thead><tbody>${eRows}</tbody></table>
  <p style="font-size:0.72rem;color:#aaa;text-align:center">Generated ${new Date().toLocaleDateString('en-GB')}</p>
  <script>window.onload=function(){window.print()}<\/script></body></html>`;

// ── ARCHIVE ──
async function loadArchive() {
  const el=document.getElementById('arcList');
  el.innerHTML='<div class="loader">Loading...</div>';
  try {
    const snap=await getDocs(collection(db,'hmrc-archive'));
    if(snap.empty){el.innerHTML='<div class="empty"><div class="ei">🗂️</div><p>No archived months yet.</p></div>';return;}
    const months=snap.docs.map(d=>d.id).sort((a,b)=>{
      const p=s=>{const[m,y]=s.split('-');return new Date('1 '+m+' '+y);};
      return p(b)-p(a);
    });
    el.innerHTML=months.map(m=>`<div class="arc-card" id="ac-${m}">
      <div class="arc-hdr" onclick="toggleArc('${m}')">
        <div><div class="arc-name">${m.replace('-',' ')}</div><div class="arc-sub" id="as-${m}">Tap to expand</div></div>
        <span class="arc-chev">▼</span>
      </div>
      <div class="arc-body" id="ab-${m}"><div class="loader">Loading...</div></div>
    </div>`).join('');
  }catch(e){el.innerHTML='<div class="empty"><p>Error loading archives</p></div>';}
}

window.toggleArc = async function(mk) {
  const card=document.getElementById('ac-'+mk);
  const isOpen=card.classList.contains('open');
  card.classList.toggle('open',!isOpen);
  if(!isOpen) {
    try {
      const snap=await getDocs(collection(db,'hmrc-archive',mk,'entries'));
      const es=snap.docs.map(d=>d.data());
      const tc=es.reduce((s,e)=>s+(parseFloat(e.costPrice)||0),0);
      const ts=es.reduce((s,e)=>s+(parseFloat(e.sellPrice)||0),0);
      const tp=ts-tc;
      document.getElementById('as-'+mk).textContent=`${es.length} cookers · Profit: ${fmt(tp)}`;
      document.getElementById('ab-'+mk).innerHTML=`
        <div class="arc-stats">
          <div class="arc-stat"><div class="al">Items</div><div class="av" style="color:var(--accent)">${es.length}</div></div>
          <div class="arc-stat"><div class="al">Cost</div><div class="av" style="color:#ffaa00">${fmts(tc)}</div></div>
          <div class="arc-stat"><div class="al">Profit</div><div class="av" style="color:${tp>=0?'var(--green)':'var(--red)'}">${fmts(tp)}</div></div>
        </div>
        ${es.map((e,i)=>{const p=(parseFloat(e.sellPrice)||0)-(parseFloat(e.costPrice)||0);return `<div class="ecard" style="margin-top:6px"><div><div class="ebrand">${esc(e.brand)}</div><div class="emeta"><span>Cost:<strong>${fmt(e.costPrice)}</strong></span><span>Sell:<strong>${fmt(e.sellPrice)}</strong></span><span>${esc(e.size||'')}</span></div><span class="ptag${p<0?' loss':''}">${p<0?'▼ Loss':'▲ Profit'} ${fmt(p)}</span></div></div>`;}).join('')}`;
    }catch(e){document.getElementById('ab-'+mk).innerHTML='<p style="color:var(--red);padding:10px">Error loading</p>';}
  }
};
